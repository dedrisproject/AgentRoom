version: 2

project_name: agentroom

before:
  hooks:
    - go mod tidy

builds:
  - id: agentroom
    main: ./cmd/agentroom
    binary: agentroom
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    format: tar.gz
    name_template: "agentroom_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - install.sh

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: dedrisproject
    name: agentroom
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Tag}}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch
